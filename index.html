<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIbox 登录 / 注册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container {
            background: white; border-radius: 24px; padding: 48px 40px;
            width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header .icon { font-size: 48px; margin-bottom: 12px; }
        .header h2 { font-size: 24px; color: #1a1a2e; font-weight: 700; }
        .header p { font-size: 14px; color: #999; margin-top: 6px; }
        .tabs { display: flex; background: #f5f5f5; border-radius: 12px; padding: 4px; margin-bottom: 28px; }
        .tabs button {
            flex: 1; padding: 12px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer; background: transparent; color: #888;
        }
        .tabs button.active { background: white; color: #667eea; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
        .form-group input {
            width: 100%; padding: 14px 16px; border: 2px solid #eee; border-radius: 12px;
            font-size: 15px; outline: none;
        }
        .form-group input:focus { border-color: #667eea; }
        .submit-btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; display: none; text-align: center; }
        .footer-text { text-align: center; font-size: 12px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="icon">🎬</div>
        <h2 id="title">欢迎回来</h2>
        <p id="subtitle">登录以同步你的生成记录</p>
    </div>
    <div class="tabs">
        <button id="tabLogin" class="active" onclick="switchTab('login')">登录</button>
        <button id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>
    <div id="error" class="error"></div>
    <form onsubmit="return handleSubmit(event)">
        <div class="form-group">
            <label>📧 邮箱</label>
            <input type="email" id="email" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
            <label>🔒 密码</label>
            <input type="password" id="password" placeholder="至少6位" required minlength="6">
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">登录</button>
    </form>
    <div class="footer-text">🔒 数据云端加密存储</div>
</div>

<script>
// ========== JSONBin 配置 ==========
const BIN_ID = '69eca334856a6821896f54f2';
const MASTER_KEY = '$2a$10$gzJEAznDz7lWn9UdzFz/4.tkmh0hIlOl.mj7b8ivKMEKgDKzmO7O6';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ========== 默认模型（新用户注册时自动拥有） ==========
const DEFAULT_MODELS = [
    {
        id: 'sora2_001',
        name: 'Sora2 视频生成',
        path: '/v1/videos',
        method: 'POST',
        modelId: 'sora-2-reverse',
        bodyTemplate: '{"model":"{model}","prompt":"{prompt}","aspect_ratio":"{aspect_ratio}","seconds":"{duration}","input_reference":"{images}","quality":"high"}',
        resultPath: 'task_id',
        type: 'video',
        pollPath: '/v1/videos/{task_id}',
        taskIdPath: 'task_id',
        desc: '高清+参考图',
        apiKey: '',
        baseUrl: ''
    },
    {
        id: 'img_001',
        name: '图片生成',
        path: '/images/generations',
        method: 'POST',
        modelId: 'gpt-image-2-reverse',
        bodyTemplate: '{"model":"{model}","prompt":"{prompt}","image":"{images}","n":1,"size":"{size}"}',
        resultPath: 'data[0].b64_json',
        type: 'image',
        pollPath: '',
        taskIdPath: '',
        desc: '图生图',
        apiKey: '',
        baseUrl: ''
    }
];

let mode = 'login';

function switchTab(m) {
    mode = m;
    document.getElementById('tabLogin').classList.toggle('active', m==='login');
    document.getElementById('tabRegister').classList.toggle('active', m==='register');
    document.getElementById('title').textContent = m==='login' ? '欢迎回来' : '创建账号';
    document.getElementById('subtitle').textContent = m==='login' ? '登录以同步你的生成记录' : '注册后数据云端同步';
    document.getElementById('submitBtn').textContent = m==='login' ? '登录' : '注册';
    document.getElementById('error').style.display = 'none';
}

function showErr(msg) { const e = document.getElementById('error'); e.textContent = msg; e.style.display = 'block'; }

async function handleSubmit(e) {
    e.preventDefault();
    document.getElementById('error').style.display = 'none';
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value.trim();
    if (!email || !pw) { showErr('请填写邮箱和密码'); return false; }
    if (pw.length < 6) { showErr('密码至少6位'); return false; }
    const userKey = 'u_' + btoa(email).replace(/[/+=]/g, '').slice(0, 28);
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '处理中...';
    try {
        let res = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': MASTER_KEY } });
        let data = await res.json();
        let users = data.record.users || {};
        if (mode === 'register') {
            if (users[userKey]) { showErr('邮箱已注册'); btn.disabled = false; btn.textContent = '注册'; return false; }
            users[userKey] = { email, password: pw, approved: true, models: DEFAULT_MODELS, tasks: [], createdAt: new Date().toISOString() };
            await fetch(BIN_URL, { method: 'PUT', headers: { 'X-Master-Key': MASTER_KEY, 'Content-Type': 'application/json' }, body: JSON.stringify({ users }) });
            alert('✅ 注册成功，请登录');
            switchTab('login');
            document.getElementById('password').value = '';
            btn.disabled = false; btn.textContent = '登录';
            return false;
        }
        let user = users[userKey];
        if (!user) { showErr('账号不存在'); btn.disabled = false; btn.textContent = '登录'; return false; }
        if (user.password !== pw) { showErr('密码错误'); btn.disabled = false; btn.textContent = '登录'; return false; }
        if (user.approved === false) { showErr('账号已被禁用，联系管理员'); btn.disabled = false; btn.textContent = '登录'; return false; }
        localStorage.setItem('aibox_user', JSON.stringify({ key: userKey, email, token: btoa(email + ':' + Date.now()) }));
        location.href = 'AIbox.html';
    } catch(err) { showErr('网络错误，请重试'); console.error(err); }
    btn.disabled = false; btn.textContent = mode === 'login' ? '登录' : '注册';
    return false;
}

// 自动登录检查
(function() {
    let u = localStorage.getItem('aibox_user');
    if (u) { try { let p = JSON.parse(u); if (p.token) location.href = 'AIbox.html'; } catch(e) {} }
})();
</script>
</body>
</html>
